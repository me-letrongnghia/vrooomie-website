<div class="payment-result-container">
  <div class="cancel-section">
    <div class="cancel-icon">
      <i class="fa-solid fa-circle-xmark"></i>
    </div>
    <h1>Thanh toán đã bị hủy</h1>
    <p class="cancel-message">
      Bạn đã hủy quá trình thanh toán. Đơn đặt xe của bạn chưa được xác nhận.
    </p>
    
    <div class="info-box">
      <i class="fa-solid fa-info-circle"></i>
      <p>Bạn có thể thử lại thanh toán hoặc chọn phương thức thanh toán khác.</p>
    </div>

    <div class="action-buttons">
      <button class="primary-btn" (click)="tryAgain()">
        <i class="fa-solid fa-rotate-right"></i>
        Thử lại
      </button>
      <button class="secondary-btn" (click)="goHome()">
        <i class="fa-solid fa-house"></i>
        Về trang chủ
      </button>
    </div>
  </div>
</div>
